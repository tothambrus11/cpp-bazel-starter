name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  compiler: gcc,   cc: gcc-14, cxx: g++-14 }
          - { os: ubuntu-latest,  compiler: clang, cc: clang,  cxx: clang++ }
          # macOS/gcc is intentionally omitted: Bazel's autodetected darwin
          # cc toolchain passes clang-only link flags (e.g. -fobjc-link-runtime)
          # that Homebrew GCC rejects. Using GCC on macOS needs a custom
          # cc_toolchain, which isn't worth the complexity here.
          - { os: macos-latest,   compiler: clang, cc: clang,  cxx: clang++ }
          # Windows/gcc: MinGW-w64 via msys2. See the setup step below.
          - { os: windows-latest, compiler: gcc,   cc: gcc,    cxx: g++ }
          # Windows/clang is intentionally omitted: Bazel's Windows cc-autoconf
          # only offers `clang-cl` (MSVC driver, MSVC flags), which overlaps
          # with --config=msvc. A GNU-driver clang would need a custom toolchain.
          - { os: windows-latest, compiler: msvc }

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - uses: actions/checkout@v4

      - name: Install gcc-14 (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'gcc'
        run: sudo apt-get update && sudo apt-get install -y gcc-14 g++-14

      # Windows + gcc: install MinGW-w64 via msys2, then tell Bazel to use
      # its mingw-gcc toolchain (one of the four toolchains registered by
      # rules_cc's windows_cc_configure, alongside msvc-cl, clang-cl and
      # msys-gcc). Bazel locates MinGW by walking up from $BAZEL_SH.
      - name: Set up MinGW-w64 (Windows)
        id: msys2
        if: matrix.os == 'windows-latest' && matrix.compiler == 'gcc'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          path-type: inherit
          update: false

      - name: Configure Bazel to use MinGW (Windows)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'gcc'
        run: |
          {
            echo "BAZEL_COMPILER=mingw-gcc"
            echo "BAZEL_SH=${{ steps.msys2.outputs.msys2-location }}\\usr\\bin\\bash.exe"
          } >> "$GITHUB_ENV"

      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.compiler }}
          repository-cache: true

      - run: bazel test --config=ci --config=${{ matrix.compiler }} //...
