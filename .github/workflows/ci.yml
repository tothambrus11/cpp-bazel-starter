name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  compiler: gcc,   cc: gcc-14, cxx: g++-14 }
          - { os: ubuntu-latest,  compiler: clang, cc: clang,  cxx: clang++ }
          # macOS/gcc is intentionally omitted: Bazel's autodetected darwin
          # cc toolchain passes clang-only link flags (e.g. -fobjc-link-runtime)
          # that Homebrew GCC rejects. Using GCC on macOS needs a custom
          # cc_toolchain, which isn't worth the complexity here.
          - { os: macos-latest,   compiler: clang, cc: clang,  cxx: clang++ }
          - { os: windows-latest, compiler: gcc,   cc: gcc,    cxx: g++ }
          - { os: windows-latest, compiler: clang, cc: clang,  cxx: clang++ }
          - { os: windows-latest, compiler: msvc }

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - uses: actions/checkout@v4

      - name: Install gcc-14 (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'gcc'
        run: sudo apt-get update && sudo apt-get install -y gcc-14 g++-14

      - name: Install MinGW (Windows)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'gcc'
        run: choco install mingw -y --no-progress

      - name: Install LLVM (Windows)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'clang'
        run: |
          choco install llvm -y --no-progress
          echo "C:\Program Files\LLVM\bin" >> "$GITHUB_PATH"

      # Force Unix-style toolchain autodetection (gcc/clang on PATH) instead
      # of MSVC. Note: setting BAZEL_VC="" crashes rules_cc's windows
      # configurator (it indexes value[0] without a length check).
      - name: Use Unix-style toolchain autodetection (Windows, non-MSVC jobs)
        if: matrix.os == 'windows-latest' && matrix.compiler != 'msvc'
        run: echo "BAZEL_USE_CPP_ONLY_TOOLCHAIN=1" >> "$GITHUB_ENV"

      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.compiler }}
          repository-cache: true

      - run: bazel test --config=ci --config=${{ matrix.compiler }} //...
