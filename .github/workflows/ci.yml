name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, compiler: gcc }
          - { os: ubuntu-latest, compiler: clang }
          - { os: macos-latest, compiler: clang }
          - { os: windows-latest, compiler: msvc }
          # macOS/gcc, Windows/gcc, and Windows/clang are intentionally omitted.
          # Bazel's autodetected per-OS cc-toolchains don't support them without
          # significant extra plumbing (custom toolchains, exec platforms, etc.).

    steps:
      - uses: actions/checkout@v5

      - name: Install gcc-14 (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'gcc'
        run: sudo apt-get update && sudo apt-get install -y gcc-14 g++-14

      - uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.compiler }}
          repository-cache: true

      - run: bazel test --config=ci --config=${{ matrix.compiler }} //...
