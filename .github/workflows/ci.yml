name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  compiler: gcc,   cc: gcc-14, cxx: g++-14 }
          - { os: ubuntu-latest,  compiler: clang, cc: clang,  cxx: clang++ }
          - { os: macos-latest,   compiler: clang, cc: clang,  cxx: clang++ }
          - { os: windows-latest, compiler: msvc }
          # macOS/gcc, Windows/gcc, and Windows/clang are intentionally omitted.
          # Bazel's autodetected per-OS cc-toolchains don't support them without
          # significant extra plumbing (custom toolchains, exec platforms, etc.).
          # Coverage is adequate: gcc runs on Linux, clang on Linux+macOS, MSVC
          # on Windows.

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - uses: actions/checkout@v4

      - name: Install gcc-14 (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'gcc'
        run: sudo apt-get update && sudo apt-get install -y gcc-14 g++-14

      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.compiler }}
          repository-cache: true

      - run: bazel test --config=ci --config=${{ matrix.compiler }} //...
